<!doctype html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="author" content="Bhargavi">
        <meta name="description" content="Contact information for the Sunset Bakery">
        <title>Bakery contact</title>
        <link rel="icon" href="images/images.png" type="image/x-icon">
        <link rel="stylesheet" href="design.css">
        <script src="main.js" defer></script>
    </head>
<body>
    <header class="header">
        <h1 class="header__h1">Sunset Bakery</h1>
        <nav class="header__nav">
            <ul class="header__ul">
                <li>
                    <a href="index.html" target="blank">Home</a>
                </li>
                <li>
                    <a href="/#memu">Memu</a>
                </li>
                <li>
                    <a href="hours.html" target="blank">Hours</a>
                </li>
                <li>
                    <a href="about.html" target="blank">About</a>
                </li>
            </ul>
        </nav>
    </header>
    <section class="hero">
        <figure>
            <img src="images/items.jpg" alt="Bakery items" title="Sweet and Savoury is ready!" width="800" height="600">
            <figcaption class="offscreen">
                Savoury and Delicious
            </figcaption>
        </figure>
    </section>
    <hr>
    <main class="main">
        <article class="main__article">
        <h2>Our location</h2>
        <address> 
            <fieldset class="location__fieldset">
            Sunset Bakery Road no.12 , <br>
            Banjara hills, Hyderabad, 500034
            <br>
            Phone: <a href="tel:+916302889197"> +916302889197</a>
            </fieldset>
        </address>
        </article>
        <article class="main__article contact">
            <br>
        <h2 class="contact__h2">Our contact form</h2>
        <form action="https://httpbin.org/get" method="get" class="contact__form">
        <fieldset class="contact__fieldset">
        <legend class="offscreen">Recommend us a special sweet you like</legend>
        <p class="contact__p">
            <label class="contact__label" for="Name">Name:</label>
            <input class="contact__input" type="text" name="name"
            id="name" placeholder="Your name" requried>
        </p> 
        <p class="contact__p">
            <label class="contact__label" for="Items">Choose Items:</label>
            <input class="contact__input" list="items" name="items">
        <datalist  id="items" placeholder="items" required>

                <option value=" Cream Cake">
                <option value="Cool Cake">
                <option value="Donuts">
                <option value="Pastry">
                <option value="Cookies">
                <option value="Sandwiches">   
            </datalist>
        </p> 
        <p class="contact__p">
            <label  class="contact__label" for="email">Email:</label>
            <input class="contact__input" type="email" name="email"
            id="email" placeholder="Your email" requried>
        </p>
        <p class="contact__p">
            <label  class="contact__label" for="Phone number">Phone number:</label>
            <input  class="contact__input" type="text" name="number"
            id="number" placeholder="Your number" requried>
        </p>
        <p class="contact__p">
            <label  class="contact__label" for="Message">Your Message:</label>
            <br>
            <textarea  class="contact__textarea" name="message" id="message" cols="30" rows="10" placeholder="Type your message here"></textarea>
        </p>
        </fieldset>
        <br>
        <button class="contact__button"  type="submit" formaction="https://httpbin.org/post" formmethod="post">Send</button >
        <button class="contact__button" type="reset">Reset</button>
    </form>  
    </article>
    </main>
    <hr>
    <footer class="footer">
        <p>
            <span class="nowrap">Copyright &copy; <time id="year"></time></span> 
            <span class="nowrap">Sunset Bakery</span>
            </p>
    </footer>
</body>

</html>
